services:
  # Backend Service
  - type: web
    name: file-fly-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: web
    name: file-fly-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    # This rule fixes the "Not Found" error for React Router subpaths
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: file-fly-backend
          property: host
